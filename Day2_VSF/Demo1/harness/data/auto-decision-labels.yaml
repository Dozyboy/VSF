# Closed vocabulary for the auto-decision ledger — the labels an auto-mode may stamp on a
# decision it made without a human in the loop. Human-edited (YAML); a label NOT here is a
# typo and the sink fails LOUD (exit 2, no write). Two baskets:
#   must_review — a human should skim these next morning (governance-bearing).
#   trace_only  — recorded for the trail, no review expected.
# When a decision could sit in either basket, lean to the HEAVIER one (lean_rule, axis L).
lean_rule: "Phân vân giữa 2 nhãn → chọn nhãn NẶNG hơn (must_review > trace_only)."
baskets:
  must_review: [ARCH, DEC-FLIP, SCOPE, SECURITY]
  trace_only:  [BEHAVIOR, DEPS, ASSUMPTION, TRIVIAL]
labels:
  - {name: ARCH,       basket: must_review, criteria: "Đổi kiến-trúc/cấu-trúc: ranh-giới module, data-flow, layering, pattern xuyên-suốt."}
  - {name: DEC-FLIP,   basket: must_review, criteria: "Lật/ghi-đè một quyết-định user đã chốt (một DEC hoặc lựa-chọn user tường-minh)."}
  - {name: SCOPE,      basket: must_review, criteria: "Tự mở/thu phạm-vi ngoài plan (đụng file ngoài lane, thêm việc chưa-giao)."}
  - {name: SECURITY,   basket: must_review, criteria: "Đụng auth/guard/secret/gate/quyền."}
  - {name: BEHAVIOR,   basket: trace_only,  criteria: "Đổi hành-vi/API/output quan-sát-được, không thuộc rổ nặng."}
  - {name: DEPS,       basket: trace_only,  criteria: "Thêm/đổi thư-viện/dependency."}
  - {name: ASSUMPTION, basket: trace_only,  criteria: "Quyết dựa giả-định chưa-kiểm-chứng."}
  - {name: TRIVIAL,    basket: trace_only,  criteria: "Vặt an-toàn: đổi tên local, format, typo."}
