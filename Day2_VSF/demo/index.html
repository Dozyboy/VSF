<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Task Tracker - SDLC Harness Real Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="app-header">
            <div class="header-content">
                <h1>✅ Smart Task Tracker</h1>
                <p class="subtitle">Ứng dụng Web chạy thật được phát triển chuẩn quy trình SDLC Harness</p>
            </div>
            <div class="stats-badge">
                <span id="total-count">0</span> công việc
            </div>
        </header>

        <!-- Form nhập Task mới -->
        <section class="card input-card">
            <form id="task-form">
                <div class="form-row">
                    <input type="text" id="task-input" placeholder="Nhập tên công việc mới..." required class="form-input">
                    <select id="priority-select" class="form-select">
                        <option value="low">Ưu tiên Thấp</option>
                        <option value="medium" selected>Ưu tiên Vừa</option>
                        <option value="high">Ưu tiên Cao 🚨</option>
                    </select>
                    <button type="submit" class="btn btn-primary">+ Thêm công việc</button>
                </div>
            </form>
        </section>

        <!-- Thanh bộ lọc & điều khiển -->
        <section class="filter-bar">
            <div class="filter-buttons">
                <button class="filter-btn active" data-filter="all">Tất cả (<span id="count-all">0</span>)</button>
                <button class="filter-btn" data-filter="pending">Chờ làm (<span id="count-pending">0</span>)</button>
                <button class="filter-btn" data-filter="completed">Đã xong (<span id="count-completed">0</span>)</button>
            </div>
            <button id="btn-clear-completed" class="btn btn-outline-danger">Xóa việc đã xong</button>
        </section>

        <!-- Danh sách công việc -->
        <section class="card list-card">
            <ul id="task-list" class="task-list">
                <!-- Data rendered dynamically -->
            </ul>
            <div id="empty-state" class="empty-state">
                <div class="icon">📝</div>
                <p>Chưa có công việc nào. Hãy thêm công việc mới ở trên!</p>
            </div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
