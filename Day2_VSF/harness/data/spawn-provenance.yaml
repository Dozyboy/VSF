# spawn-provenance.yaml — knobs for the Agent|Task subagent-spawn provenance
# counter (harness/scripts/spawn_provenance.py, harness/hooks/spawn_provenance_nudge.py).

# threshold: a session whose PRIOR spawn count reaches this many fires the
# Layer-1a advisory nudge (recommends hs:workflow-orchestrate) — i.e. the
# (threshold + 1)th spawn is the first one that fires. On the un-ticketed
# lane the count is now taken over the sliding unticketed_window_seconds
# window (spawns in the last W seconds), NOT accumulated since session start;
# the backing JSONL store is truncated at spawn_provenance._MAX_LINES so the
# per-spawn scan stays bounded (a PreToolUse hook runs on EVERY delegation).
threshold: 8

# block_enabled — the Layer-1b (BLOCK form) master switch. The guards
# (spawn_provenance_guard / spawn_provenance_workflow_guard) exit-2 ONLY when
# BOTH this is true AND the guard's own harness-hooks.yaml `enabled` is true.
# The token lifecycle is resolved (mint-at-approval, consume-by-count, TTL +
# sub_count_cap bounded — window_start()/budget()) and the counter is
# false-block-free (the guard excludes its own in-flight tool_use_id).
# Default ON by decision: a block makes the model AWARE and it recovers via
# hs:workflow-orchestrate (or /hs:use workflow-orchestrate when off) which
# mints a budget token — both routes are named in the guard's block reason.
block_enabled: true

# sub_count_cap — the hard width ceiling a minted orchestrate token's
# sub_count is clamped to (spawn_provenance.budget()), so a forged or
# stale-huge token can never bless an unbounded fan-out. run_state.write_token
# clamps at write time too (defense in depth).
sub_count_cap: 32

# token_ttl_seconds — how long a minted orchestrate token stays active
# (spawn_provenance.window_start()/budget()) before it expires and the
# budget reverts to the un-ticketed threshold. 1800s = 30min.
token_ttl_seconds: 1800

# unticketed_window_seconds — the sliding wall-clock window (SECONDS) for the
# un-ticketed (no-token) spawn lane. The budget is "N spawns in the last W
# seconds", NOT a count accumulated since session start: window_start()'s
# no-token branch returns `now - W`, so a spawn older than W ages out of the
# count. This is what keeps a legitimate sequential SDLC flow (cook delegating
# per phase -> test -> review -> docs -> git, 6+ children ONE AFTER ANOTHER)
# from ever tripping a gate meant to catch a sudden WIDE fan-out. 60s comfortably
# brackets any real burst (which serializes at the hook to ~N x 1.1s).
unticketed_window_seconds: 60

# The Workflow lane (Ask-3 Layer-2, spawn_provenance_workflow_guard/_nudge)
# reuses every knob above unchanged — its own width comes from
# spawn_provenance.workflow_width(), a STATIC script-parse of the Workflow
# call's tool_input.script (honest-ceiling estimate, not an execution), not
# a new config surface.
