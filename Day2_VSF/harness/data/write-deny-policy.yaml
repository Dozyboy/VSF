# write-deny-policy.yaml — SOFT deny-list (detective). Default EMPTY = allow every write.
# The HARD floor (core-immune + harness/** binary) is a code constant in
# write_deny_policy.py, NOT here.
#
# soft_rules is ONE ordered list, evaluated last-match-wins (.gitignore style).
# Each rule is exactly one of {deny: <glob>} or {allow: <glob>}:
#   - deny  -> a matched path logs a deny_soft_hit and is STILL ALLOWED (a speed
#             bump + black box, never a block);
#   - allow -> carves a path back out of an earlier deny.
# Example (broad deny, narrow allow-back):
#   soft_rules:
#     - deny: 'build/**'
#     - allow: 'build/keep/**'
soft_rules: []
