# test-strategy.yaml — SSOT: which pytest command each local/dev profile runs.
#
# Human-edited config -> YAML (docs/code-standards.md:31). harness/scripts/run_local_tests.py
# reads this file and builds the exact pytest argv, so a dev or agent runs the SAME
# command CI runs instead of hand-crafting one (drift). Every profile below MUST mirror
# the matching case in scripts/ci.sh (unit / orchestrator / release-toolkit /
# scoring-contract) — harness/tests/test_run_local_tests.py::test_strategy_matches_ci_sh
# reads ci.sh back and reddens the moment this file or ci.sh drifts. Edit both together.
schema_version: "1.0"

profiles:
  # Mirrors ci.sh `unit)`: full harness/tests/, loadfile scheduler (a file's module-scoped
  # fixtures build once per worker instead of on every worker `load` would scatter them
  # across), -p no:randomly on the hot path when pytest-randomly is installed.
  harness:
    path: harness/tests
    scheduler: loadfile
    norandomly: true

  # Dev inner-loop subset ONLY — NOT a gate substitute, never trust this in place of the
  # full run. Skips the ~15 heaviest files (install/lifecycle/subprocess-heavy suites) for
  # fast local iteration; measured 70.22s vs ~127s full, covering 6841/7056 tests
  # (brief.md). The push/ship gate and CI always run the full `harness` profile (or the
  # sharded unit-Nof3 cells) — this profile trades coverage for speed on purpose.
  harness-fast:
    path: harness/tests
    scheduler: loadfile
    norandomly: true
    ignore:
      - test_install.py
      - test_harness_lifecycle.py
      - test_install_ccstatusline.py
      - test_install_components.py
      - test_bash_safety_guard.py
      - test_spec_shape_e2e_smoke.py
      - test_courier_slice.py
      - test_drawio_catalog_search.py
      - test_find_flaky.py
      - test_find_polluter.py
      - test_find_polluter_artifact.py
      - test_shrink_failure.py
      - test_decomposition_invariants.py
      - test_hs_cli.py
      - test_artifact_io.py

  # Mirrors ci.sh `orchestrator)`: loadfile scheduler, ORCH_MARKER excludes real_sdk/real_host
  # (the two markers that need a live SDK/host and are gated to nightly/manual runs).
  orchestrator:
    path: orchestrator/tests
    scheduler: loadfile
    marker: "not real_sdk and not real_host"
    norandomly: true

  # Mirrors ci.sh `release-toolkit)`: --dist load (NOT loadfile) — the shared-tarball
  # fixture in test_courier_sync.py only pays off when its file's tests are SCATTERED
  # across workers; loadfile would pack them onto one worker and force it serial again.
  release:
    path: release/tests
    scheduler: load
    norandomly: true

  # Mirrors ci.sh `scoring-contract)`: no xdist at all — the suite runs in well under 1s,
  # so spinning up worker processes would cost more than it saves.
  scoring:
    path: orchestrator/tests
    marker: scoring_contract
    xdist: false
