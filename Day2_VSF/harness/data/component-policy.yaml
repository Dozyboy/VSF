# component-policy.yaml — component on/off selection (source of truth).
#
# Records ONLY deviations from ship-all: a component absent here is ENABLED
# (default). component_config.py rewrites this file + projects the chosen state
# into harness-hooks.yaml. Tracked in git so a toggle is a visible diff.
#
#
components:
  uiux: false
  viz: false
  devops: false
  ai: false
  stack: false
  integrations: false
  extra: false
  flow: false
  think: false
  research: false
  create: false
  mem: false
  meta: false
