# Isolated test-only Postgres stack (F8) — own compose project (`name:` below), own port
# (5433, never 5432, so it never collides with a dev-profile `docker compose up -d`), own
# volume. Mounts docker/postgres-init/ so the 2-role + pgvector init-scripts run when this
# test database initializes (this is why the compose file lives at P3 instead of P9 — the test
# DB starts being used from P3 onward, and it needs the roles to already exist).
#
# Pattern: R-DI §7 (docker-compose.test.yml — separate compose stack, NOT testcontainers).
name: studio-test

services:
  postgres-test:
    image: pgvector/pgvector:pg17
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: studio_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - studio_pgdata_test:/var/lib/postgresql/data
      - ./docker/postgres-init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d studio_test"]
      interval: 2s
      timeout: 3s
      retries: 30

volumes:
  studio_pgdata_test:
    name: studio_pgdata_test
