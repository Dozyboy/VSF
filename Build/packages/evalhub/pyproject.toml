[project]
name = "agentcore-studio-evalhub"
version = "0.1.0"
description = "AgentCore Studio — eval harness, LLM-judge, scorecard, golden-set. Owner: AIE-2. (evalhub, not eval, to avoid shadowing the builtin.)"
requires-python = ">=3.14"
dependencies = [
    "agentcore-studio-contracts",
    "psycopg[binary,pool]>=3.2",
    "httpx>=0.28",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/studio_evalhub"]
