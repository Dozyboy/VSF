[project]
name = "agentcore-studio-kb"
version = "0.1.0"
description = "AgentCore Studio — KB pipeline + fence-DATA (kb.search, chunk-level RLS). Owner: DE."
requires-python = ">=3.14"
dependencies = [
    "agentcore-studio-contracts",
    "psycopg[binary,pool]>=3.2",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/studio_kb"]
