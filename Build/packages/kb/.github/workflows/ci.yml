# CI repo con — STUB: chỉ gọi reusable workflow ở repo cha. Toàn bộ logic reconstruct nằm 1 chỗ:
#   agentcore-studio-kit/.github/workflows/reusable-domain-ci.yml
# Muốn đổi quy trình CI (bước test, DB, token...) thì sửa file đó, cả 6 repo con ăn theo.
# secrets: inherit truyền PAT (đã set ở repo con) sang reusable workflow.
name: ci

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  ci:
    uses: AI20K-VGR/agentcore-studio-kit/.github/workflows/reusable-domain-ci.yml@main
    with:
      domain_path: packages/kb
      domain_package: agentcore-studio-kb
    secrets: inherit
