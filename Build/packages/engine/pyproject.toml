[project]
name = "agentcore-studio-engine"
version = "0.1.0"
description = "AgentCore Studio — interpreter + 6 node executors + fence-EXECUTOR. Stateless (no schema). Owner: AIE-1."
requires-python = ">=3.14"
dependencies = [
    "agentcore-studio-contracts",
]

[project.scripts]
studio-engine-demo = "studio_engine.__main__:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/studio_engine"]
