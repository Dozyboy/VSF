repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.9.2
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  # NDA guard: blocks mentor/rubric/answer-key material from ever being committed into ANY of
  # the studio repos (the parent workspace or the per-domain submodules the OJT team has write
  # access to). Install this hook in each repo's .pre-commit-config. See GITFLOWS.md.
  - repo: local
    hooks:
      - id: nda-denylist
        name: NDA denylist (mentor/rubric/answer-key files)
        entry: scripts/nda-denylist.sh
        language: script
        pass_filenames: false
